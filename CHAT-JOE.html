<!DOCTYPE HTML>
<html lang="es">
<head>
   <meta charset="UTF-8"/>
   <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
   <title>IA Chat - Autodetect Pro</title>
   
   <!-- Librería para procesar Código y Tablas (Markdown) -->
   <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
    body { background: #000; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
    
    /* Cabecera */
    header { background: #111; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
    #Status { font-size: 11px; font-family: monospace; color: gold; }

    /* Área de Chat */
    #All { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
    ul { padding: 0; margin: 0; list-style: none; display: flex; flex-direction: column; }
    
    li { width: fit-content; max-width: 85%; margin-top: 15px; padding: 15px; font-weight: bold; border-radius: 20px; line-height: 1.5; word-wrap: break-word; }

    .user-msg { color: #000; background: gold; align-self: flex-end; border-bottom-right-radius: 2px; }
    .bot-msg { color: #fff; background: #1a1a1b; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #333; }

    /* --- ESTILOS DE CÓDIGO Y TABLAS --- */
    pre { background: #000 !important; color: #0f0; padding: 15px; border-radius: 10px; overflow-x: auto; border: 1px solid #444; margin: 10px 0; font-family: monospace; }
    code { font-family: monospace; background: #333; padding: 2px 4px; border-radius: 4px; }
    table { border-collapse: collapse; width: 100%; margin: 10px 0; background: #222; }
    th, td { border: 1px solid #444; padding: 8px; text-align: left; }
    th { background: #333; color: gold; }

    /* Controles */
    #Input-Container { background: #000; padding: 20px; border-top: 1px solid #222; display: flex; gap: 10px; }
    #Input { flex: 1; padding: 15px; background: gold; color: #000; font-weight: bold; border-radius: 25px; border: none; outline: none; font-size: 16px; }
    .btn-send { background: gold; border: none; width: 50px; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 18px; }
    .btn-clear { background: transparent; color: #ff4444; border: 1px solid #ff4444; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }
</style>
</head>
<body>

  <header>
      <div id="Status">Iniciando sistema...</div>
      <button class="btn-clear" onclick="borrarHistorial()">Limpiar Memoria</button>
  </header>

  <div id="All">
     <ul id="Lista"></ul>
  </div>

  <form onsubmit="event.preventDefault(); Chat()">
    <div id="Input-Container">
        <input id="Input" type="text" placeholder="Espera un momento..." disabled autocomplete="off"/>
        <button class="btn-send" type="submit">➔</button>
    </div>
  </form>

<script>
// --- CONFIGURACIÓN (Lógica que funcionó) ---
const API_KEY = "AIzaSyDuTCKSkczyweucfRIggdS4DnwYiGGN570"; 
let historial = JSON.parse(localStorage.getItem("chat_storage")) || [];
let MODELO_TRABAJO = ""; 
let VERSION_API = "v1beta"; 

// --- 1. AUTODETECCIÓN (Tu lógica original) ---
async function inicializar() {
    const status = document.getElementById("Status");
    try {
        const resp = await fetch(`https://generativelanguage.googleapis.com/${VERSION_API}/models?key=${API_KEY}`);
        const data = await resp.json();

        if (data.error) throw new Error(data.error.message);

        const listaModelos = data.models.map(m => m.name.split('/').pop());
        
        if (listaModelos.includes("gemini-1.5-flash")) {
            MODELO_TRABAJO = "gemini-1.5-flash";
        } else if (listaModelos.includes("gemini-pro")) {
            MODELO_TRABAJO = "gemini-pro";
        } else {
            MODELO_TRABAJO = listaModelos.find(m => m.includes("gemini"));
        }

        if (!MODELO_TRABAJO) throw new Error("No se encontró Gemini.");

        status.textContent = `✅ CONECTADO: ${MODELO_TRABAJO}`;
        document.getElementById("Input").disabled = false;
        document.getElementById("Input").placeholder = "Pregúntame lo que quieras...";
        
        cargarHistorialGuardado();

    } catch (e) {
        status.textContent = "❌ ERROR: " + e.message;
        status.style.color = "red";
    }
}

// --- 2. CARGAR MENSAJES GUARDADOS ---
function cargarHistorialGuardado() {
    const lista = document.getElementById("Lista");
    if (historial.length === 0) {
        agregarMensajeVisual("🤖 Hola, soy tu IA. Recordaré esta charla y puedo mostrarte código o tablas.", "bot-msg");
    } else {
        historial.forEach(msg => {
            agregarMensajeVisual(msg.parts[0].text, msg.role === "user" ? "user-msg" : "bot-msg");
        });
    }
}

// --- 3. FUNCIÓN DE CHAT ---
async function Chat() {
    const input = document.getElementById("Input");
    const prompt = input.value.trim();
    if (!prompt || !MODELO_TRABAJO) return;

    // Usuario
    agregarMensajeVisual(prompt, "user-msg");
    historial.push({ role: "user", parts: [{ text: prompt }] });
    input.value = "";
    
    // IA - Burbuja de espera
    const botLi = agregarMensajeVisual("🤖 Pensando...", "bot-msg");

    try {
        const url = `https://generativelanguage.googleapis.com/${VERSION_API}/models/${MODELO_TRABAJO}:generateContent?key=${API_KEY}`;
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: historial })
        });

        const data = await response.json();
        if (data.error) throw new Error(data.error.message);

        const respuestaIA = data.candidates[0].content.parts[0].text;
        
        // Guardar en historial y localStorage
        historial.push({ role: "model", parts: [{ text: respuestaIA }] });
        localStorage.setItem("chat_storage", JSON.stringify(historial));

        // Renderizar Markdown (Código y Tablas)
        botLi.innerHTML = marked.parse(respuestaIA);
        hablar(respuestaIA);

    } catch (error) {
        botLi.textContent = "❌ Error: " + error.message;
        historial.pop(); // Evitar romper el orden si falla
    }
    
    scrollAbajo();
}

function agregarMensajeVisual(texto, clase) {
    const li = document.createElement('li');
    li.className = clase;
    
    if (clase === "bot-msg" && texto !== "🤖 Pensando...") {
        li.innerHTML = marked.parse(texto);
    } else {
        li.textContent = texto;
    }

    document.getElementById("Lista").appendChild(li);
    scrollAbajo();
    return li;
}

function scrollAbajo() {
    const contenedor = document.getElementById("All");
    contenedor.scrollTop = contenedor.scrollHeight;
}

function borrarHistorial() {
    if(confirm("¿Borrar toda la conversación?")) {
        localStorage.removeItem("chat_storage");
        location.reload();
    }
}

function hablar(texto) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        // Limpiamos etiquetas HTML del texto para que la voz no las lea
        const div = document.createElement("div");
        div.innerHTML = marked.parse(texto);
        const limpio = (div.textContent || div.innerText).replace(/[*#_]/g, '');
        const voz = new SpeechSynthesisUtterance(limpio);
        voz.lang = "es-ES";
        window.speechSynthesis.speak(voz);
    }
}

inicializar();
</script>
</body>
</html>
