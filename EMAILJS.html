<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
   <title>REGISTRO 📋</title>
<style>
body {
    color: #fff;
    background: #000;
}
#F {
    gap: 2vh;
    display: grid;
    margin: 5vh 10vh;    
}
#L1, #L2 {
    color: orange;
}
#N {
    color: #000;   
    padding: 5px; 
    outline: none; 
    background: gold;
    font-weight: bold;
    border-radius: 20px;   
}
#I {
    color: #fff;   
    padding: 5px; 
    outline: none; 
    background: red;
    font-weight: bold;
    border-radius: 20px;   
}
button {
    width: 50%;
    color: #000;
    background: #4f9;
    font-weight: bold;
    border-radius: 50px;
}
</style>
</head>
<body>
<center>
<form id="F">
    <label id="L1" for="I">Nombre:</label>
    <input type="text" id="N" name="Nombre">
    <label id="L2" for="I">Contraseña:</label>
    <input type="password" id="I" name="🔑">
    <button type="submit">Enviar al Correo</button>
</form>
</center>
<script>
  <!-- Inicializa con tu llave pública -->
    emailjs.init("IiuPuXl8wRYZEspZE");

    F.onsubmit = (e) => { 
        e.preventDefault();
        
        var data = Object.fromEntries(
            new FormData(e.target)
        );        

  <!-- Enviamos los datos al servicio -->
        emailjs.send("service_hju9onq", "template_o0nixjq", {
            datos: JSON.stringify(data),
            to_email: "lamoviedeoro@gmail.com"
        })
        .then(() => {
            alert("Enviado con éxito");
            N.value = "";
            I.value = "";
        }, (error) => {
            alert("Error al enviar: " + JSON.stringify(error));
        });
    };
</script>
</body>
</html>
