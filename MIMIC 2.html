<script>
<!-- Detectar cuando entra o sale de fullscreen -->
document.addEventListener('fullscreenchange', function() {
  if (document.fullscreenElement) {
    <!-- Si estamos en pantalla completa, bloquear orientación horizontal -->
    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('landscape');
    }
  } else {
    <!-- Si salimos de pantalla completa, volver a orientación vertical -->
    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('portrait');
    }
  }
});

<script>
    window.onload = () => {
     if (window.innerWidth > window.innerHeight) {
    Title.style.marginLeft = '100vh';

 }

<script>
var API_KEY = "e29e6334";
var tituloPredeterminado = Title.textContent; // Obtiene el título del elemento <B id="Title">

  // --- FUNCIÓN TRADUCIR MODIFICADA (AHORA RECIBE sl Y tl) ---
async function traducir(texto, sl = 'en', tl = 'es') {
  if (!texto) return '';
  try {
    // sl = Source Language, tl = Target Language
    var res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${tl}&dt=t&q=${encodeURIComponent(texto)}`);
    var data = await res.json();
    return data[0][0][0]; // Texto traducido
  } catch (error) {
    console.error("Error al traducir:", error);
    return texto; // Si falla, muestra el original
  }
}

      window.addEventListener("DOMContentLoaded", async () => {
  var Aux = document.getElementById("Aux");

  // Limpiar el título predeterminado (ej: quitar prefijos o espacios)
  var tituloLimpio = tituloPredeterminado.replace(/°/g, '').trim(); 
  
  try {
    // 1. PRE-TRADUCCIÓN: Traducir el título de búsqueda de Español a Inglés (es -> en)
    var tituloOMDb = await traducir(tituloLimpio, 'es', 'en');
    
    // Fallback: Si la traducción es vacía o es idéntica (ya estaba en inglés), usar el título limpio original
    if (!tituloOMDb || tituloOMDb === tituloLimpio) {
        tituloOMDb = tituloLimpio;
    }
    
    // 2. Consulta a OMDb con el título en inglés
    var response = await fetch("https://www.omdbapi.com/?t=" + encodeURIComponent(tituloOMDb) + "&apikey=" + API_KEY);
    var data = await response.json();

    if (data.Response === "False") {
      // Si la búsqueda no tiene éxito, mostrar el botón de sinopsis original
      S.style.display = "block";
      return;
    }

    // 3. POST-TRADUCCIÓN: Traducir los resultados de OMDb de Inglés a Español (en -> es)
    var [titulo, sinopsis, genero, director] = await Promise.all([
      traducir(data.Title, 'en', 'es'),
      traducir(data.Plot, 'en', 'es'),
      traducir(data.Genre, 'en', 'es'),
      traducir(data.Director, 'en', 'es')
    ]);
    
    // Mostrar el botón de sinopsis ahora que tenemos la sinopsis traducida
    S.style.display = "block";
    P.textContent = sinopsis; // Asignar la sinopsis traducida al elemento <p id="P">

    var poster = data.Poster !== "N/A" ? data.Poster : document.getElementById("Photo").src; // Usar poster de OMDb o la imagen local

 
    Aux.innerHTML = `
      <div class="result-section">
        <img src="${poster}" alt="${titulo}" style="width: 20%; border-radius: 16px">
     <div class="result-title">${titulo} (${data.Year})</div>
        <p><strong>🎬 Género:</strong> ${genero}</p>
        <p><strong>🎥 Director:</strong> ${director}</p>
      </div>
    `;
  } catch (error) {
    console.error("Error al obtener datos de la API OMDb:", error);
    Aux.innerHTML = "<p style='color:white;'>No se pudo cargar la información de la película.</p>";
  }
});
</script>
</body>
