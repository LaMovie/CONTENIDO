<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💾 REGISTROS</title>
<link rel="manifest" href="manifest.json">

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('Registro de SW exitoso', reg))
      .catch(err => console.warn('Error al registrar SW', err));
  }
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@300;500&display=swap');
:root {
            --neon-violet: #bc13fe;
            --deep-purple: #240046;
            --electric-purple: #7b2cbf;
            --glass: rgba(123, 44, 191, 0.1);
            --bg-dark: #05010d;
            --danger: #ff4d4d;
        }

        body {
            background: var(--bg-dark);
            color: #e0aaff;
            font-family: 'Roboto Mono', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .panel-registro {
            background: var(--glass);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid var(--electric-purple);
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.1);
            margin-bottom: 30px;
            width: 90%;
            max-width: 550px;
            text-align: center;
        }

        h2 { font-family: 'Orbitron'; font-size: 0.85rem; color: var(--neon-violet); letter-spacing: 2px; }

        input {
            background: #1a0a2e;
            border: 1px solid var(--electric-purple);
            color: #f7dfff;
            padding: 12px;
            border-radius: 12px;
            margin: 8px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { box-shadow: 0 0 10px var(--neon-violet); border-color: var(--neon-violet); }

        button {
            background: linear-gradient(45deg, var(--electric-purple), var(--neon-violet));
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Orbitron';
            font-size: 0.65rem;
            transition: 0.4s;
            margin: 5px;
        }

        button:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--neon-violet); }

        .btn-danger { background: linear-gradient(45deg, #800000, var(--danger)); }
        .btn-edit { background: #2a2a2a; border: 1px solid var(--electric-purple); }

        .search-box { width: 80%; max-width: 600px; margin: 10px; }
        
        #buscador {
            width: 90%;
            padding: 18px;
            background: transparent;
            border-bottom: 3px solid var(--electric-purple);
            color: white;
            font-size: 1.2rem;
            text-align: center;
            border-radius: 30px;
        }

        table {
            width: 100%;
            max-width: 800px;
            margin-top: 40px;
            border-collapse: separate;
            border-spacing: 0 10px;
            display: none; 
        }

        th { color: var(--neon-violet); font-family: 'Orbitron'; padding: 15px; text-transform: uppercase; font-size: 0.8rem; }
        tr { background: rgba(255, 255, 255, 0.03); transition: 0.3s; }
        tr:hover { background: rgba(188, 19, 254, 0.1); }
        td { padding: 15px; text-align: center; border-top: 1px solid rgba(123, 44, 191, 0.2); border-bottom: 1px solid rgba(123, 44, 191, 0.2); }
        
        .btn-delete {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 5px 10px;
            font-size: 0.7rem;
            cursor: pointer;
        }

        .btn-delete:hover { background: var(--danger); color: white; }

        #no-results { display: none; color: var(--danger); margin-top: 25px; font-weight: bold; }
        
        .Sum {
            width: 80%;
            color: #fff;   
            margin-bottom: 3vh;
            background: #bc13cc; 
            border-radius: 20px;
            border: 2px solid #bc13f3;
            padding: 10px;
            cursor: pointer;
            font-family: 'Orbitron';
        }

        .export-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed var(--electric-purple);
        }

        #input-file { display: none; }
</style>
</head>
<body>
    <center>
        <h1 style="font-family: 'Orbitron'; letter-spacing: 5px; text-shadow: 0 0 15px var(--neon-violet);">
            HPN <span style="color:white">DATA</span>
        </h1>

        <details id="menu-registro" name="info">
            <summary class="Sum">REGISTRO Y GESTIÓN</summary>
            <div class="panel-registro">
                <h2>INGRESAR DATOS AL SISTEMA</h2>
                <input type="number" id="reg-zona" placeholder="Nº ZONA">
                <input type="number" id="reg-codigo" placeholder="CÓDIGO (9 DÍGITOS)" maxlength="9">
                <br>
                <button onclick="guardarDato()">ENCRIPTAR Y GUARDAR</button>

                <div class="export-section">
                    <h2>IMPORTAR / EXPORTAR</h2>
                    <button onclick="document.getElementById('input-file').click()">IMPORTAR CSV/EXCEL</button>
                    <input type="file" id="input-file" accept=".csv, .txt" onchange="importarArchivo(event)">
                    <br>
                    <button onclick="descargarTXT()">DESCARGAR .TXT</button>
                    <button onclick="descargarExcel()">DESCARGAR .CSV (EXCEL)</button>
                    <br>
                    <button class="btn-danger" onclick="limpiarBaseDatos()">ELIMINAR TODA LA DATA</button>
                </div>
            </div>
        </details>

        <div class="search-box">
            <input type="number" id="buscador" placeholder="Buscador..." autocomplete="off">
        </div>

        <div id="no-results">SISTEMA: DATOS NO LOCALIZADOS</div>

        <table id="tabla-datos">
            <thead>
                <tr>
                    <th>UBICACIÓN</th>
                    <th>IDENTIFICADOR</th>
                    <th>ACCIONES</th>
                </tr>
            </thead>
            <tbody id="lista-db"></tbody>
        </table>
    </center>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            if (type === 'save') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.1);
            } else if (type === 'delete') {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.2);
            }
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.2);
            if (navigator.vibrate) {
                navigator.vibrate(type === 'save' ? 50 : [100, 50, 100]);
            }
        }

        function cerrarSummary() {
            const menu = document.getElementById('menu-registro');
            if (menu) menu.removeAttribute('open');
        }

        function Tildes(texto) {
            return texto.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
        }

        let baseDeDatos = JSON.parse(localStorage.getItem('misZonasViolet')) || [];

        function guardarDato() {
            const zona = document.getElementById('reg-zona').value;
            const codigo = document.getElementById('reg-codigo').value;
            if (zona === "" || codigo.length !== 9) {
                alert("ERROR: Datos incompletos o código inválido.");
                return;
            }
            baseDeDatos.push({ zona: zona, codigo: codigo, id: Date.now() });
            actualizarStorage();
            playSound('save');
            cerrarSummary();
            document.getElementById('reg-zona').value = "";
            document.getElementById('reg-codigo').value = "";
            renderizarTabla();
            document.getElementById('buscador').value = "";
            document.getElementById('tabla-datos').style.display = "none";
        }

        // --- FUNCIÓN PARA IMPORTAR ARCHIVOS ---
        function importarArchivo(event) {
            const archivo = event.target.files[0];
            if (!archivo) return;

            const lector = new FileReader();
            lector.onload = function(e) {
                const contenido = e.target.result;
                const lineas = contenido.split(/\r?\n/);
                let nuevosRegistros = 0;

                lineas.forEach((linea, index) => {
                    // Saltar encabezado o líneas vacías
                    if (index === 0 && (linea.toLowerCase().includes("zona") || linea.toLowerCase().includes("hpn"))) return;
                    if (linea.trim() === "") return;

                    // Detectar separador (coma, punto y coma o tabulación)
                    const columnas = linea.split(/[;,]/);
                    if (columnas.length >= 2) {
                        const zona = columnas[0].replace(/[^0-9]/g, ""); // Extraer solo números
                        const codigo = columnas[1].trim();
                        
                        if (zona && codigo.length === 9) {
                            baseDeDatos.push({ zona: zona, codigo: codigo, id: Date.now() + nuevosRegistros });
                            nuevosRegistros++;
                        }
                    }
                });

                if (nuevosRegistros > 0) {
                    actualizarStorage();
                    renderizarTabla();
                    playSound('save');
                    alert(`ÉXITO: Se han importado ${nuevosRegistros} registros.`);
                    cerrarSummary();
                } else {
                    alert("ERROR: No se encontraron datos válidos. El formato debe ser ZONA;CODIGO (9 dígitos).");
                }
            };
            lector.readAsText(archivo);
            event.target.value = ''; // Resetear input
        }

        function editarDato(id) {
            const item = baseDeDatos.find(i => i.id === id);
            const nuevaZona = prompt("Editar Nº ZONA:", item.zona);
            const nuevoCodigo = prompt("Editar CÓDIGO (9 dígitos):", item.codigo);
            if (nuevaZona !== null && nuevoCodigo !== null) {
                if (nuevaZona === "" || nuevoCodigo.length !== 9) {
                    alert("ERROR: Datos inválidos.");
                } else {
                    item.zona = nuevaZona;
                    item.codigo = nuevoCodigo;
                    actualizarStorage();
                    renderizarTabla();
                    playSound('save');
                }
            }
        }

        function eliminarDato(id) {
            if(confirm("¿Deseas eliminar este registro?")) {
                baseDeDatos = baseDeDatos.filter(item => item.id !== id);
                actualizarStorage();
                renderizarTabla();
                verificarVisibilidad();
                playSound('delete');
            }
        }

        function limpiarBaseDatos() {
            if(confirm("¿ESTÁS SEGURO? Se borrarán TODOS los registros permanentemente.")) {
                baseDeDatos = [];
                actualizarStorage();
                renderizarTabla();
                verificarVisibilidad();
                playSound('delete');
                cerrarSummary();
            }
        }

        function actualizarStorage() {
            localStorage.setItem('misZonasViolet', JSON.stringify(baseDeDatos));
        }

        function renderizarTabla() {
            const listaDB = document.getElementById('lista-db');
            listaDB.innerHTML = "";
            baseDeDatos.forEach(item => {
                const row = document.createElement('tr');
                row.classList.add('Data');
                row.innerHTML = `
                    <td style="font-weight: bold;">ZONA ${item.zona}</td>
                    <td style="color: var(--neon-violet)">${item.codigo}</td>
                    <td>
                        <button class="btn-edit" onclick="editarDato(${item.id})">EDITAR</button>
                        <button class="btn-delete" onclick="eliminarDato(${item.id})">ELIMINAR</button>
                    </td>
                `;
                listaDB.appendChild(row);
            });
        }

        function verificarVisibilidad() {
            const query = document.getElementById('buscador').value;
            if (query === "") document.getElementById('tabla-datos').style.display = "none";
        }

        function descargarTXT() {
            if (baseDeDatos.length === 0) return alert("No hay datos para exportar");
            let contenido = "REGISTROS HPN DATA\n" + "=".repeat(20) + "\n";
            baseDeDatos.forEach(i => contenido += `ZONA: ${i.zona} | CODIGO: ${i.codigo}\n`);
            const blob = new Blob([contenido], { type: 'text/plain' });
            crearEnlaceDescarga(blob, "registros_hpn.txt");
        }

        // --- EXPORTACIÓN MEJORADA PARA EXCEL ---
        function descargarExcel() {
            if (baseDeDatos.length === 0) return alert("No hay datos para exportar");
            // Usamos punto y coma (;) para que Excel separe las columnas automáticamente en español
            let csv = "ZONA;IDENTIFICADOR\n"; 
            baseDeDatos.forEach(i => csv += `${i.zona};${i.codigo}\n`);
            
            // \ufeff es el BOM de UTF-8, indispensable para que Excel no rompa los formatos
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            crearEnlaceDescarga(blob, "registros_hpn.csv");
        }

        function crearEnlaceDescarga(blob, nombre) {
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = nombre;
            link.click();
        }

        const inputBuscador = document.getElementById('buscador');
        const tabla = document.getElementById('tabla-datos');
        const noResults = document.getElementById('no-results');

        inputBuscador.addEventListener("keyup", () => {
            const query = Tildes(inputBuscador.value.trim());
            const filas = document.querySelectorAll(".Data");
            let encontrados = 0;
            if (query === "") {
                tabla.style.display = "none";
                noResults.style.display = "none";
                return;
            }
            filas.forEach(fila => {
                const textoFila = Tildes(fila.textContent);
                if (textoFila.includes(query)) {
                    fila.style.display = "table-row";
                    encontrados++;
                } else {
                    fila.style.display = "none";
                }
            });
            if (encontrados > 0) {
                tabla.style.display = "table";
                noResults.style.display = "none";
            } else {
                tabla.style.display = "none";
                noResults.style.display = "block";
            }
        });

        window.onload = renderizarTabla;
    </script>
</body>
</html>
