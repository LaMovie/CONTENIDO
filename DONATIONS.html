<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💳 DONATIONS 💳</title>     
<style>
body {
    background: url(https://bit.ly/3WekaZh);
    background-size: cover;
    background-position: center;
}
.modal {  
  top: 0;
  left: 0;
  z-index: 1;
  width: 100%;
  height: 100%;
  display: block;
  overflow: auto;
  position: fixed;
  background: rgb(0,0,0,.5);
}
.modal-contenido {
  top: 0%;
  width: 80%;  
  padding: 20px;
  margin: 15% auto;
  position: relative;
  border-radius: 20px;
  border: 1px solid #888;
  background-color: #000;  
  box-shadow: 10px 10px 0px black;
}
.modal-contenido:hover { scale: 105%; }
#Label { color: gray; opacity: .8; position: relative; }
#Imgg { width: 30%; height: auto; }
#Imgg:hover { scale: 150%; }
#H { color: #aaa; font-family: serif; }
#U { color: #4f3; opacity: .5; }
.btn-pago {
    background: #009ee3;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 20px;
    font-weight: bold;
    cursor: none;
    margin-top: 15px;
    width: 90%;
    box-shadow: 0 0 15px #009ee3;
}
.btn-pago:hover { scale: .8; background: #f00; }
</style>     
</head>
<body>      
<center>
  <div class="modal" id="Modal">
    <h2 id="H">Contenido Premium</h2>
    <h4 id="U">📼 ¡Gracias por tu apoyo! 🫂 📼</h4>
    <div class="modal-contenido"> 
      <img id="Imgg" src="https://bit.ly/49X0ijf"/><br/>
      <label id="Label">Ayudanos con tu aporte</label><br/><br/>
      
      <button class="btn-pago" onclick="window.open('https://link.mercadopago.cl/estampablillo', '_blank')">👉🏽DONACIÓN AQUÍ 💳</button>   
    </div>
  </div>
</center>         

<audio autoplay src="https://dn721604.ca.archive.org/0/items/sergio-mendes-feat.-black-eyed-peas-mas-que-nada-mp-3-160-k-1/Donaciones.mp3"></audio>
<script>
var textos = ["🔥 Donaciones y Soporte", "🪙 Ayuda al soporte 🪙", "¡Gracias por tu apoyo! 🫂"];

   let index = 0;
  setInterval(() => {
    
    U.textContent = textos[index];
    index = (index + 1) % textos.length;
}, 2500);
</script>
</body>
</html>
